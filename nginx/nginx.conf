server {
    listen 80;
    server_tokens off;

    location /api/ {
        proxy_pass http://backend:8000;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
    }

    location /media/ {
        alias /media/;
    }

    location /static/ {
        alias /staticfiles/;
    }

    location / {
        root /staticfiles/;
        index index.html index.htm;
        try_files $uri $uri/ /index.html =404;
    }
}